name: 今日・今週の予定を通知

on:
  schedule:
    - cron: '0 0 * * *'   # 毎朝9:00 JST（UTC 0:00）
  workflow_dispatch:       # 手動テスト用

jobs:
  notify-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: googleapis インストール
        run: npm install googleapis

      - name: 今日・今週の予定を取得して Slack に通知
        uses: actions/github-script@v7
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          MEETING_CALENDAR_ID: ${{ secrets.MEETING_CALENDAR_ID }}
          MEETING_CALENDAR_ID_2: ${{ secrets.MEETING_CALENDAR_ID_2 }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const { google } = require(`${process.env.GITHUB_WORKSPACE}/node_modules/googleapis`);

            const credentials = JSON.parse(process.env.GOOGLE_SERVICE_ACCOUNT_KEY);
            const auth = new google.auth.GoogleAuth({
              credentials,
              scopes: ['https://www.googleapis.com/auth/calendar.readonly'],
            });
            const calendar = google.calendar({ version: 'v3', auth });

            const calendarIds = [process.env.MEETING_CALENDAR_ID];
            if (process.env.MEETING_CALENDAR_ID_2) {
              calendarIds.push(process.env.MEETING_CALENDAR_ID_2);
            }
            const timeZone = 'Asia/Tokyo';

            // 今日（JST）
            const now = new Date();
            const jstOffset = 9 * 60 * 60 * 1000;
            const jstNow = new Date(now.getTime() + jstOffset);
            const todayStr = jstNow.toISOString().split('T')[0];

            // 今後7日間
            const weekEnd = new Date(jstNow.getTime() + 7 * 24 * 60 * 60 * 1000);
            const weekEndStr = weekEnd.toISOString().split('T')[0];

            // 曜日名
            const dayNames = ['日', '月', '火', '水', '木', '金', '土'];

            // 日付文字列から正しい曜日を取得（タイムゾーンずれ回避）
            const getDayName = (dateStr) => {
              const [y, m, d] = dateStr.split('-').map(Number);
              const utcDate = new Date(Date.UTC(y, m - 1, d));
              return dayNames[utcDate.getUTCDay()];
            };

            // 複数カレンダーからイベントを取得してマージ
            async function fetchEvents(timeMin, timeMax) {
              const allEvents = [];
              for (const calendarId of calendarIds) {
                try {
                  const res = await calendar.events.list({
                    calendarId,
                    timeMin,
                    timeMax,
                    singleEvents: true,
                    orderBy: 'startTime',
                    timeZone,
                  });
                  const events = (res.data.items || []).filter(e => e.status !== 'cancelled');
                  allEvents.push(...events);
                } catch (e) {
                  console.log(`カレンダー ${calendarId} の取得スキップ:`, e.message);
                }
              }
              // 開始時間で重複排除（同じタイトル・同じ開始時間）してソート
              // 重複排除（📋プレフィックスを除去して比較）
              const seen = new Set();
              return allEvents
                .filter(e => {
                  const normalizedTitle = e.summary.replace(/^📋\s*/, '');
                  const key = `${normalizedTitle}_${e.start.dateTime || e.start.date}`;
                  if (seen.has(key)) return false;
                  seen.add(key);
                  return true;
                })
                .sort((a, b) => {
                  const aTime = a.start.dateTime || a.start.date;
                  const bTime = b.start.dateTime || b.start.date;
                  return aTime.localeCompare(bTime);
                });
            }

            // イベントを1行にフォーマット
            const formatEvent = (e) => {
              const title = e.summary.replace(/^📋\s*/, '');
              const start = e.start.dateTime
                ? new Date(e.start.dateTime).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', timeZone })
                : '終日';
              const end = e.end.dateTime
                ? new Date(e.end.dateTime).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', timeZone })
                : '';
              const location = e.location ? `  ${e.location}` : '';
              return `${start}〜${end}  *${title}*${location}`;
            };

            // --- 今日の予定 ---
            const todayEvents = await fetchEvents(
              `${todayStr}T00:00:00+09:00`,
              `${todayStr}T23:59:59+09:00`
            );

            // --- 今週の予定（今日の翌日〜週末） ---
            const tomorrowDate = new Date(jstNow.getTime() + 24 * 60 * 60 * 1000);
            const tomorrowStr = tomorrowDate.toISOString().split('T')[0];

            let weekEvents = [];
            if (tomorrowStr <= weekEndStr) {
              weekEvents = await fetchEvents(
                `${tomorrowStr}T00:00:00+09:00`,
                `${weekEndStr}T23:59:59+09:00`
              );
            }

            // --- メッセージ組み立て ---
            const parts = [];

            // 今日の予定
            const todayDay = getDayName(todayStr);
            if (todayEvents.length === 0) {
              parts.push(`*今日の予定（${todayStr} ${todayDay}）*\n予定なし`);
            } else {
              const list = todayEvents.map((e, i) => `${i + 1}. ${formatEvent(e)}`).join('\n');
              parts.push(`*今日の予定（${todayStr} ${todayDay}）— ${todayEvents.length}件*\n${list}`);
            }

            // 今後7日間の予定（日付ごとにグループ化）
            if (weekEvents.length === 0) {
              parts.push(`*今後7日間の予定*\n予定なし`);
            } else {
              const byDate = {};
              for (const e of weekEvents) {
                const dateStr = e.start.dateTime
                  ? e.start.dateTime.split('T')[0]
                  : e.start.date;
                if (!byDate[dateStr]) byDate[dateStr] = [];
                byDate[dateStr].push(e);
              }

              const weekLines = [];
              for (const [dateStr, events] of Object.entries(byDate)) {
                const day = getDayName(dateStr);
                weekLines.push(`\n_${dateStr}（${day}）_`);
                events.forEach((e, i) => {
                  const title = e.summary.replace(/^📋\s*/, '');
                  const start = e.start.dateTime
                    ? new Date(e.start.dateTime).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', timeZone })
                    : '';
                  const end = e.end.dateTime
                    ? new Date(e.end.dateTime).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', timeZone })
                    : '';
                  const time = start ? `${start}〜${end}` : '';
                  const location = e.location ? e.location : '';
                  const details = [time, location].filter(Boolean).join('  ');
                  weekLines.push(`${i + 1}. *${title}*${details ? '  ' + details : ''}`);
                });
              }

              parts.push(`*今後7日間の予定 — ${weekEvents.length}件*${weekLines.join('\n')}`);
            }

            const message = `<@UVC1GK6G2>\n\n${parts.join('\n\n')}`;
            console.log(message);

            if (process.env.SLACK_WEBHOOK_URL) {
              await fetch(process.env.SLACK_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: message }),
              });
              console.log('✅ Slack に通知しました');
            }
